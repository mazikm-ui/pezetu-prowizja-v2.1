workflows:
  android-apk:
    name: Build APK
    max_build_duration: 15

    environment:
      flutter: stable

    scripts:
      - name: Create project
        script: flutter create .

      - name: Get packages
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
